name: PR preview build

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: void-yield-mlp
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: void-yield-mlp/package-lock.json

      - name: Install
        run: npm ci

      - name: Test
        run: npm test

      - name: Build (relative base for portability)
        env:
          VITE_BASE_PATH: ./
        run: npm run build

      - name: Upload preview artifact
        uses: actions/upload-artifact@v4
        with:
          name: pr-${{ github.event.pull_request.number }}-preview
          path: void-yield-mlp/dist
          retention-days: 14

      - name: Comment with download link
        uses: actions/github-script@v7
        with:
          script: |
            const run = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = [
              "### 📦 Preview build ready",
              "",
              `Download artifact \`pr-${context.payload.pull_request.number}-preview\` from the [workflow run](${run}), unzip, and \`open index.html\` (or serve with \`npx serve dist\`).`,
              "",
              "_Static build only — no live ngrok-style URL. The merged main branch deploys live to GitHub Pages automatically._",
            ].join("\n");
            // Replace any earlier comment from this workflow so the thread doesn't pile up.
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
            });
            const prior = comments.data.find((c) => c.user.type === "Bot" && c.body.includes("Preview build ready"));
            if (prior) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: prior.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                body,
              });
            }
